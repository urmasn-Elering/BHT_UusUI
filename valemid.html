<!DOCTYPE html>
<html lang="et">
<head>
<meta charset="UTF-8">
<title>BHT Elekter — Valemid</title>
<style>
  :root {
    --teal-900: #004b58;
    --teal-800: #00606f;
    --teal-700: #007B8F;
    --teal-600: #0e8fa3;
    --teal-100: #cfe6ea;
    --teal-050: #e8f2f4;
    --ink-900: #1e2a2e;
    --ink-700: #3d4e55;
    --ink-500: #6b7c83;
    --ink-400: #8a9aa0;
    --line: #d8dfe2;
    --line-soft: #e9edef;
    --bg: #ffffff;
    --bg-zebra: #f6f8f9;
    --bg-sidebar: #ffffff;
    --green-600: #1f8a55;
    --green-500: #2e9b61;
    --green-050: #e9f6ee;
    --amber-050: #fff6db;
    --amber-500: #e0a81b;
    --red-500: #c8394a;
    --radius: 4px;
    --radius-lg: 6px;
    --shadow-sm: 0 1px 2px rgba(0,0,0,.04);
    --focus: 0 0 0 3px rgba(0,123,143,.2);
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    font-family: "Inter", "Segoe UI", -apple-system, BlinkMacSystemFont, Arial, sans-serif;
    font-size: 13px;
    color: var(--ink-900);
    background: #fff;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  button { font-family: inherit; font-size: inherit; cursor: pointer; }
  a { color: var(--teal-700); text-decoration: none; }

  /* Icons */
  .icon {
    display: inline-block;
    width: 16px; height: 16px;
    vertical-align: middle;
    stroke-width: 1.75;
    stroke: currentColor;
    fill: none;
    stroke-linecap: round;
    stroke-linejoin: round;
    flex-shrink: 0;
  }
  .icon-sm { width: 14px; height: 14px; }
  .icon-lg { width: 18px; height: 18px; }

  /* ============ HEADER ============ */
  .topbar {
    height: 48px;
    background: var(--teal-900);
    color: #fff;
    display: flex; align-items: center;
    padding: 0 20px;
    gap: 24px;
  }
  .brand { display: flex; align-items: center; gap: 14px; }
  .brand svg { display: block; }
  .brand-sub {
    font-size: 12px;
    letter-spacing: 0.08em;
    color: rgba(255,255,255,.92);
    font-weight: 400;
  }
  .topbar-right {
    margin-left: auto;
    display: flex; align-items: center; gap: 22px;
    font-size: 13px;
  }
  .topbar-right .item {
    display: inline-flex; align-items: center; gap: 7px;
    color: #fff;
    cursor: pointer;
    white-space: nowrap;
  }
  .topbar-right .item:hover { opacity: .85; }
  .topbar-right .sep {
    width: 1px; height: 20px; background: rgba(255,255,255,.2);
  }

  /* ============ LAYOUT ============ */
  .layout {
    display: grid;
    grid-template-columns: 220px 1fr;
    min-height: calc(100vh - 48px);
  }

  /* ============ SIDEBAR ============ */
  .sidebar {
    background: var(--bg-sidebar);
    border-right: 1px solid var(--line);
    padding: 18px 0;
  }
  .side-back {
    display: flex; align-items: center; gap: 6px;
    padding: 8px 20px;
    color: var(--ink-700);
    font-weight: 600;
    font-size: 11.5px;
    letter-spacing: 0.08em;
    cursor: pointer;
  }
  .side-back:hover { color: var(--teal-700); }
  .side-item {
    display: block;
    padding: 9px 20px 9px 36px;
    font-size: 13px;
    color: var(--ink-700);
    border-left: 3px solid transparent;
    cursor: pointer;
  }
  .side-item:hover { background: var(--teal-050); color: var(--teal-800); }
  .side-item.active {
    background: var(--teal-050);
    color: var(--teal-800);
    border-left-color: var(--teal-700);
    font-weight: 600;
  }

  /* ============ MAIN ============ */
  .main {
    padding: 20px 24px 40px;
    min-width: 0;
  }

  .page-head {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 14px;
  }
  .page-title {
    font-size: 20px;
    font-weight: 600;
    color: var(--ink-900);
    margin: 0;
    letter-spacing: -0.01em;
  }
  .page-actions { display: flex; gap: 10px; }

  /* Buttons */
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    height: 34px;
    padding: 0 14px;
    border-radius: var(--radius);
    border: 1px solid transparent;
    font-size: 13px; font-weight: 500;
    transition: background .12s, border-color .12s, color .12s;
    background: #fff;
    color: var(--ink-900);
  }
  .btn:focus-visible { outline: none; box-shadow: var(--focus); }

  .btn-primary {
    background: var(--teal-700); color: #fff; border-color: var(--teal-700);
  }
  .btn-primary:hover { background: var(--teal-800); border-color: var(--teal-800); }

  .btn-secondary {
    background: #fff; color: var(--teal-700); border-color: var(--teal-700);
  }
  .btn-secondary:hover { background: var(--teal-050); }

  /* Filter bar */
  .filter-bar {
    display: flex; align-items: center; gap: 16px;
    background: #fff;
    border: 1px solid var(--line);
    border-radius: var(--radius-lg);
    padding: 12px 14px;
    margin-bottom: 14px;
    flex-wrap: wrap;
  }
  .field { display: flex; align-items: center; gap: 8px; }
  .field-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--ink-700);
    letter-spacing: 0.02em;
  }
  .search-wrap {
    position: relative;
    flex: 1 1 280px;
    min-width: 220px;
  }
  .search-wrap .search-icon {
    position: absolute; top: 50%; left: 10px; transform: translateY(-50%);
    color: var(--ink-400); pointer-events: none;
  }
  .input, .select {
    height: 34px;
    width: 100%;
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 0 12px;
    font-size: 13px;
    color: var(--ink-900);
    background: #fff;
    font-family: inherit;
  }
  .input:focus, .select:focus { outline: none; border-color: var(--teal-700); box-shadow: var(--focus); }
  .search-wrap .input { padding-left: 34px; }

  .select-wrap {
    position: relative;
    min-width: 180px;
  }
  .select-wrap .chev-icon {
    position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
    color: var(--ink-500); pointer-events: none;
  }
  .select {
    appearance: none; -webkit-appearance: none;
    padding-right: 30px;
    cursor: pointer;
  }

  /* Toggle */
  .toggle-wrap {
    margin-left: auto;
    display: flex; align-items: center; gap: 10px;
  }
  .toggle {
    position: relative;
    width: 36px; height: 20px;
    background: #c4cdd1;
    border-radius: 999px;
    cursor: pointer;
    transition: background .15s;
  }
  .toggle::after {
    content: "";
    position: absolute; top: 2px; left: 2px;
    width: 16px; height: 16px;
    background: #fff; border-radius: 50%;
    transition: left .15s;
    box-shadow: 0 1px 2px rgba(0,0,0,.2);
  }
  .toggle.on { background: var(--teal-700); }
  .toggle.on::after { left: 18px; }
  .toggle-wrap label { font-size: 13px; color: var(--ink-700); cursor: pointer; user-select: none; }

  /* ============ TABLE ============ */
  .table-wrap {
    border: 1px solid var(--line);
    border-radius: var(--radius-lg);
    overflow: hidden;
    background: #fff;
    box-shadow: var(--shadow-sm);
  }
  table {
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed;
  }
  thead th {
    background: var(--teal-900);
    color: #fff;
    font-weight: 600;
    font-size: 11.5px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    text-align: left;
    padding: 11px 12px;
    white-space: nowrap;
    user-select: none;
  }
  thead th .sort {
    display: inline-flex; vertical-align: middle;
    margin-left: 6px;
    color: rgba(255,255,255,.55);
    cursor: pointer;
  }
  thead th .sort:hover { color: #fff; }
  thead th.sorted .sort { color: #fff; }

  tbody td {
    padding: 10px 12px;
    font-size: 13px;
    color: var(--ink-900);
    border-top: 1px solid var(--line-soft);
    vertical-align: middle;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  tbody tr:nth-child(odd) td { background: var(--bg-zebra); }
  tbody tr:hover td { background: var(--teal-050); }
  tbody tr.expanded td { background: #fff !important; }

  tbody tr.child-row td {
    background: #fff !important;
    color: var(--ink-500);
    font-size: 12.5px;
    padding: 7px 12px;
    border-top: 1px dashed var(--line-soft);
  }
  tbody tr.child-row td:nth-child(2) { padding-left: 48px; }
  tbody tr.child-row.active td {
    color: var(--green-600);
    font-weight: 600;
  }
  tbody tr.child-row:hover td { background: #f3faf6 !important; }

  tbody tr.row-warn td { background: var(--amber-050) !important; }
  tbody tr.row-warn:hover td { background: #fff1c4 !important; }

  .row-index {
    color: var(--ink-400);
    font-variant-numeric: tabular-nums;
    font-size: 12px;
  }

  .expand-btn {
    background: none; border: none; padding: 0;
    width: 20px; height: 20px;
    display: inline-flex; align-items: center; justify-content: center;
    color: var(--ink-700);
    margin-right: 4px;
    vertical-align: middle;
  }
  .expand-btn:hover { color: var(--teal-700); }
  .expand-btn .icon { transition: transform .15s; }
  tr.expanded .expand-btn .icon { transform: rotate(90deg); }

  .code-cell {
    font-family: "JetBrains Mono", "Menlo", ui-monospace, monospace;
    font-size: 12.5px;
    color: var(--ink-900);
    font-weight: 500;
  }
  .code-wrap {
    display: inline-flex; align-items: center; gap: 4px;
    vertical-align: middle;
  }

  .chip {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 999px;
    font-size: 11.5px;
    font-weight: 500;
    background: var(--teal-050);
    color: var(--teal-800);
    border: 1px solid var(--teal-100);
  }

  /* Actions */
  .row-actions {
    display: flex; align-items: center; gap: 4px;
    justify-content: flex-end;
  }
  .icon-btn {
    width: 28px; height: 28px;
    display: inline-flex; align-items: center; justify-content: center;
    background: transparent; border: 1px solid transparent;
    border-radius: var(--radius);
    color: var(--ink-500);
    transition: color .12s, background .12s, border-color .12s;
    padding: 0;
  }
  .icon-btn:hover { color: var(--teal-700); background: var(--teal-050); }
  .icon-btn.danger:hover { color: var(--red-500); background: #fcecee; }

  .log-btn {
    height: 26px;
    padding: 0 10px;
    border-radius: var(--radius);
    background: var(--teal-700);
    color: #fff;
    border: 1px solid var(--teal-700);
    font-size: 11.5px;
    font-weight: 500;
    display: inline-flex; align-items: center; gap: 4px;
  }
  .log-btn:hover { background: var(--teal-800); }

  .add-formula-btn {
    height: 26px;
    padding: 0 10px;
    border-radius: var(--radius);
    background: #fff;
    color: var(--teal-700);
    border: 1px solid var(--teal-700);
    font-size: 11.5px;
    font-weight: 500;
    display: inline-flex; align-items: center; gap: 4px;
    white-space: nowrap;
  }
  .add-formula-btn:hover { background: var(--teal-050); }

  /* Footer pagination */
  .table-footer {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 14px;
    border-top: 1px solid var(--line-soft);
    background: #fff;
    font-size: 12.5px;
    color: var(--ink-500);
  }
  .pagination { display: flex; align-items: center; gap: 4px; }
  .page-btn {
    min-width: 28px; height: 28px;
    border: 1px solid var(--line);
    background: #fff;
    border-radius: var(--radius);
    color: var(--ink-700);
    font-size: 12.5px;
    padding: 0 8px;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .page-btn:hover:not(:disabled):not(.active) { background: var(--teal-050); border-color: var(--teal-700); color: var(--teal-700); }
  .page-btn.active { background: var(--teal-700); border-color: var(--teal-700); color: #fff; }
  .page-btn:disabled { opacity: .4; cursor: not-allowed; }

  /* Toast */
  .toast {
    position: fixed; bottom: 24px; right: 24px;
    background: #fff;
    border: 1px solid var(--line);
    border-left: 4px solid var(--teal-700);
    padding: 12px 16px;
    border-radius: var(--radius-lg);
    box-shadow: 0 8px 24px rgba(0,0,0,.12);
    display: none;
    font-size: 13px;
    gap: 10px; align-items: center;
    z-index: 100;
    max-width: 340px;
  }
  .toast.show { display: flex; animation: slideIn .25s ease; }
  .toast .icon { color: var(--teal-700); }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .inline-desc { color: var(--ink-500); font-size: 12.5px; }

  @media (max-width: 1100px) {
    .layout { grid-template-columns: 180px 1fr; }
  }
</style>
</head>

<script>
const rows = [
  {
    code: "SENDOUT_TSOMOL",
    descr: "A37 välja saatmine läbi TSO MOL",
    start: "05.07.24 13:18",
    end:   "31.12.80 10:55",
    workflow: "RESERVE-mFRR",
    type: "Sõnum",
    warn: false,
    versions: [
      { start: "05.07.24 13:18", end: "31.12.80 10:55", active: true },
      { start: "10.02.20 08:57", end: "05.07.24 13:18", active: false },
      { start: "19.04.18 00:00", end: "10.02.20 08:57", active: false },
      { start: "12.03.18 09:44", end: "19.04.18 00:00", active: false },
      { start: "29.11.17 11:57", end: "12.03.18 09:44", active: false }
    ]
  },
  { code: "B21_BID_IN",            descr: "B21 sõnumi töötlus DATA staatusesse",            start: "12.02.24 15:03", end: "—",              workflow: "RESERVE-CALC",      type: "Sõnum",    warn: false },
  { code: "A09_AC_DC_SCADA",       descr: "Kooperib ac, dc andmed SCADAst BHTsse",           start: "12.02.24 15:03", end: "—",              workflow: "—",                 type: "Andmed",   warn: false },
  { code: "TEAVITUS",              descr: "ACT A40 tellimuse (A10) teavituse saatmine",      start: "12.02.24 15:03", end: "—",              workflow: "RESERVE-mFRR",      type: "Teavitus", warn: false },
  { code: "AVP_Koond_ERALDATUD_V6RK_KUST", descr: "Arvutab EVP koondraporti eraldatud mahtude põhjal", start: "12.02.24 15:03", end: "—", workflow: "SETTLEMENT",   type: "Andmed",   warn: false },
  { code: "aFRR_SETTLEMENT_ENERGY_UNIT_P", descr: "Arvutab aFRR energiamahud ühikute kaupa",  start: "12.02.24 15:03", end: "—",              workflow: "SETTLEMENT",        type: "Andmed",   warn: false },
  { code: "A09_SYSPLAN_CONF",      descr: "Kontrollime, kas pärast A09 SYSPLAN saabumist …", start: "12.02.24 15:03", end: "—",              workflow: "OPPLAN-SYSPLAN",    type: "Sõnum",    warn: false },
  { code: "A02_CALC_DEFAULT_ELR",  descr: "Arvutab ELER algväärtused vaikeseadete alusel",   start: "12.02.24 15:03", end: "—",              workflow: "—",                 type: "Andmed",   warn: false },
  { code: "ESP_BH_A07_CONF_VANA",  descr: "BH summaarne määratud maht kinnituseks",          start: "12.02.24 15:03", end: "—",              workflow: "SETTLEMENT",        type: "Sõnum",    warn: true  }
];

function ic(id, size){ return `<svg class="icon${size==='sm'?' icon-sm':''}"><use href="#i-${id}"/></svg>`; }

function render(list) {
  const tbody = document.getElementById("tbody");
  tbody.innerHTML = "";
  list.forEach((r, i) => {
    const tr = document.createElement("tr");
    tr.dataset.idx = i;
    if (r.warn) tr.classList.add("row-warn");
    const hasVersions = r.versions && r.versions.length > 0;

    tr.innerHTML = `
      <td><span class="row-index">${i + 1}</span></td>
      <td>
        <span class="code-wrap">
          ${hasVersions
            ? `<button class="expand-btn" onclick="toggleExpand(this, event)" aria-label="Laienda">${ic('chevron-right','sm')}</button>`
            : `<span style="display:inline-block;width:24px"></span>`}
          <span class="code-cell">${r.code}</span>
        </span>
      </td>
      <td title="${r.descr}"><span class="inline-desc">${r.descr}</span></td>
      <td>${r.start}</td>
      <td>${r.end}</td>
      <td>${r.workflow === "—" ? '<span style="color:var(--ink-400)">—</span>' : `<span class="chip">${r.workflow}</span>`}</td>
      <td>
        <div class="row-actions">
          <button class="add-formula-btn" onclick="toast('Uue valemi versiooni vorm: ${r.code}')">${ic('plus','sm')}Lisa valem</button>
          <button class="log-btn" onclick="toast('Logi vaade: ${r.code}')">${ic('list','sm')}Logi</button>
          <button class="icon-btn" title="Muuda" onclick="toast('Muuda: ${r.code}')">${ic('pencil')}</button>
          <button class="icon-btn" title="Laadi alla" onclick="toast('Allalaadimine: ${r.code}')">${ic('download')}</button>
          <button class="icon-btn danger" title="Kustuta" onclick="confirmDelete('${r.code}')">${ic('trash')}</button>
        </div>
      </td>
    `;
    tbody.appendChild(tr);

    if (hasVersions) {
      r.versions.forEach((v, vi) => {
        const child = document.createElement("tr");
        child.className = "child-row" + (v.active ? " active" : "");
        child.dataset.parent = i;
        child.style.display = "none";
        child.innerHTML = `
          <td></td>
          <td style="font-size:12px">v${r.versions.length - vi}${v.active?' • aktiivne':''}</td>
          <td></td>
          <td>${v.start}</td>
          <td>${v.end}</td>
          <td></td>
          <td>
            <div class="row-actions">
              <button class="log-btn" onclick="toast('Logi versioonile v${r.versions.length - vi}')">${ic('list','sm')}Logi</button>
              <button class="icon-btn" title="Muuda">${ic('pencil')}</button>
              <button class="icon-btn" title="Laadi alla">${ic('download')}</button>
              <button class="icon-btn danger" title="Kustuta">${ic('trash')}</button>
            </div>
          </td>
        `;
        tbody.appendChild(child);
      });
    }
  });
}

function toggleExpand(btn, ev) {
  ev.stopPropagation();
  const tr = btn.closest("tr");
  const idx = tr.dataset.idx;
  const expanded = tr.classList.toggle("expanded");
  document.querySelectorAll(`tr.child-row[data-parent="${idx}"]`).forEach(child => {
    child.style.display = expanded ? "" : "none";
  });
}

function applyFilter() {
  const q = document.getElementById("searchInput").value.toLowerCase();
  const wf = document.getElementById("wfFilter").value;
  const tp = document.getElementById("typeFilter").value;
  const filtered = rows.filter(r => {
    if (q && !(r.code.toLowerCase().includes(q) || r.descr.toLowerCase().includes(q))) return false;
    if (wf !== "Kõik" && r.workflow !== wf) return false;
    if (tp !== "Kõik" && r.type !== tp) return false;
    return true;
  });
  render(filtered);
  document.getElementById("countLabel").textContent = `Näitab ${filtered.length} / ${rows.length} kirjet`;
}

document.getElementById("searchInput").addEventListener("input", applyFilter);
document.getElementById("wfFilter").addEventListener("change", applyFilter);
document.getElementById("typeFilter").addEventListener("change", applyFilter);

let toastTimer;
function toast(msg) {
  const t = document.getElementById("toast");
  document.getElementById("toastText").textContent = msg;
  t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove("show"), 2200);
}

function confirmDelete(code) {
  if (confirm(`Kas oled kindel, et soovid kustutada valemit "${code}"?`)) {
    toast(`Kustutatud: ${code}`);
  }
}

render(rows);
</script>
